# Dependency vulnerability audit (known CVEs in pip/npm packages).
# Complements CodeQL (source analysis) and Dependabot (update PRs).
name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 8 * * 1"

jobs:
  python-deps:
    name: pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install project in clean venv and audit
        run: |
          python -m venv .audit-venv
          .audit-venv/bin/pip install -U pip
          .audit-venv/bin/pip install -e .
          .audit-venv/bin/pip install pip-audit
          # Skip the local editable project name (not on PyPI).
          .audit-venv/bin/pip-audit --progress-spinner=off --skip-editable

  npm-deps:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
