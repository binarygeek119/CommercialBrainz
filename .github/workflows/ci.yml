name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: commercialbrainz
          POSTGRES_PASSWORD: commercialbrainz
          POSTGRES_DB: commercialbrainz
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Run migrations
        env:
          DATABASE_URL_SYNC: postgresql://commercialbrainz:commercialbrainz@localhost:5432/commercialbrainz
          DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@localhost:5432/commercialbrainz
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
        run: alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@localhost:5432/commercialbrainz
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck and build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Build API image
        run: docker build -f infra/Dockerfile.api -t commercialbrainz-api:ci .

      - name: Build web image
        run: docker build -f infra/Dockerfile.web -t commercialbrainz-web:ci .
