name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: commercialbrainz
          POSTGRES_PASSWORD: commercialbrainz
          POSTGRES_DB: commercialbrainz
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Run migrations
        env:
          DATABASE_URL_SYNC: postgresql://commercialbrainz:commercialbrainz@localhost:5432/commercialbrainz
          DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@localhost:5432/commercialbrainz
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
        run: alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@localhost:5432/commercialbrainz
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
        run: |
          pytest -v \
            --junitxml=reports/junit.xml \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov

      - name: Coverage summary
        if: always()
        run: |
          if [[ -f reports/coverage.xml ]]; then
            {
              echo "## Backend coverage"
              echo '```'
              python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("reports/coverage.xml").getroot()
          rate = float(root.attrib.get("line-rate", 0)) * 100
          lines = int(root.attrib.get("lines-valid", 0))
          covered = int(root.attrib.get("lines-covered", 0))
          print(f"Line coverage: {rate:.1f}% ({covered}/{lines})")
          PY
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/reports/junit.xml
            backend/reports/coverage.xml
            backend/reports/htmlcov
          if-no-files-found: ignore

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: |
          mkdir -p reports
          npm test -- \
            --reporter=default \
            --reporter=github-actions \
            --reporter=junit \
            --outputFile.junit=reports/junit.xml

      - name: Typecheck and build
        run: npm run build

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: frontend/reports/junit.xml
          if-no-files-found: ignore

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Build API image
        run: docker build -f infra/Dockerfile.api -t commercialbrainz-api:ci .

      - name: Build web image
        run: docker build -f infra/Dockerfile.web -t commercialbrainz-web:ci .
