name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: commercialbrainz
          POSTGRES_PASSWORD: commercialbrainz
          POSTGRES_DB: commercialbrainz
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Run migrations
        env:
          DATABASE_URL_SYNC: postgresql://commercialbrainz:commercialbrainz@localhost:5432/commercialbrainz
          DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@localhost:5432/commercialbrainz
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
        run: alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@localhost:5432/commercialbrainz
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
        run: |
          pytest -v \
            --junitxml=reports/junit.xml \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov

      - name: Coverage summary
        if: always()
        run: |
          if [[ -f reports/coverage.xml ]]; then
            {
              echo "## Backend coverage"
              echo '```'
              python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("reports/coverage.xml").getroot()
          rate = float(root.attrib.get("line-rate", 0)) * 100
          lines = int(root.attrib.get("lines-valid", 0))
          covered = int(root.attrib.get("lines-covered", 0))
          print(f"Line coverage: {rate:.1f}% ({covered}/{lines})")
          PY
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/reports/junit.xml
            backend/reports/coverage.xml
            backend/reports/htmlcov
          if-no-files-found: ignore

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: |
          mkdir -p reports
          npm test -- \
            --reporter=default \
            --reporter=github-actions \
            --reporter=junit \
            --outputFile.junit=reports/junit.xml

      - name: Typecheck and build
        run: npm run build

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: frontend/reports/junit.xml
          if-no-files-found: ignore

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: binarygeek119
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.api
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/binarygeek119/commercialbrainz-api:${{ github.sha }}
            ghcr.io/binarygeek119/commercialbrainz-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.web
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/binarygeek119/commercialbrainz-web:${{ github.sha }}
            ghcr.io/binarygeek119/commercialbrainz-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Make GHCR packages public (anonymous VM pulls)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          for pkg in commercialbrainz-api commercialbrainz-web; do
            # Linked packages live under /users/{owner}/packages/...
            if gh api --method PUT \
              -H "Accept: application/vnd.github+json" \
              "/users/${OWNER}/packages/container/${pkg}/visibility" \
              -f visibility=public; then
              echo "public: $pkg"
            else
              echo "WARN: could not set $pkg public via API (check GitHub Packages UI if VM pulls 401)"
            fi
          done
