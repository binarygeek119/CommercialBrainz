# Auto-deploy CommercialBrainz to the GCE VM after CI succeeds on main.
#
# CI pushes api/web images to GHCR; this workflow pulls them on the VM
# (no on-VM docker build in the common path).
#
# Auth: Workload Identity Federation (no JSON key secret).
# GCP setup (one-time, already applied for this project):
#   SA: github-deploy@commercialbrainz.iam.gserviceaccount.com
#   Pool/provider: github-actions / github
#
# Optional repository variables:
#   GCP_PROJECT_ID  — default commercialbrainz
#   VM_NAME         — default commercialbrainz-vm
#
# Manual run: Actions → Deploy → Run workflow
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GCE VM
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Deploy the commit CI validated (not necessarily latest main tip).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/820871329461/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-deploy@commercialbrainz.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'commercialbrainz' }}
          VM_NAME: ${{ vars.VM_NAME || 'commercialbrainz-vm' }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
          CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-gcloud-vm.sh
          echo "Deploying IMAGE_TAG=${IMAGE_TAG}"
          ./scripts/deploy-gcloud-vm.sh
