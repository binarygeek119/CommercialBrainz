# CodeQL vulnerability scanning for Python (API) and JS/TS (web UI).
# Results appear under the repo Security → Code scanning tab.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan catches newly published CodeQL queries / CVEs.
    - cron: "17 7 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Prefer the CodeQL tools bundled with the action (`linked`) to avoid a large
      # separate download of codeql-bundle-*.tar.zst, which often fails with ECONNRESET.
      # See: https://github.com/github/codeql-action/issues/3367
      - name: Initialize CodeQL
        id: codeql-init
        continue-on-error: true
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
          tools: linked

      - name: Retry Initialize CodeQL
        if: steps.codeql-init.outcome == 'failure'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
          tools: linked

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
