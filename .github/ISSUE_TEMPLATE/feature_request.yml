name: Feature request
description: Propose a new capability or UX improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the idea. Small, concrete proposals are easiest to ship.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web UI
        - API
        - Auth / accounts
        - Submit / edits / voting
        - Search / browse
        - Admin / mod tools
        - Data export / dumps
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this
