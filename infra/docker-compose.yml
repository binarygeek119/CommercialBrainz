services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commercialbrainz
      POSTGRES_PASSWORD: commercialbrainz
      POSTGRES_DB: commercialbrainz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./gcloud/cloudsql-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commercialbrainz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    # Prebuilt on GitHub Actions → GHCR; local `compose build` still works.
    image: ghcr.io/binarygeek119/commercialbrainz-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@postgres:5432/commercialbrainz
      DATABASE_URL_SYNC: postgresql://commercialbrainz:commercialbrainz@postgres:5432/commercialbrainz
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - thumbnail_uploads:/data/thumbnails
      - logo_uploads:/data/logos
      # Admin UI / env cookies for yt-dlp (writable so admins can update cookies.txt)
      - ../data/ytdlp:/data/ytdlp
    command: ["api"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  worker:
    image: ghcr.io/binarygeek119/commercialbrainz-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@postgres:5432/commercialbrainz
      DATABASE_URL_SYNC: postgresql://commercialbrainz:commercialbrainz@postgres:5432/commercialbrainz
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data/ytdlp:/data/ytdlp
    command: ["worker"]

  web:
    image: ghcr.io/binarygeek119/commercialbrainz-web:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  thumbnail_uploads:
  logo_uploads:
