services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commercialbrainz
      POSTGRES_PASSWORD: commercialbrainz
      POSTGRES_DB: commercialbrainz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./gcloud/cloudsql-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commercialbrainz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@postgres:5432/commercialbrainz
      DATABASE_URL_SYNC: postgresql://commercialbrainz:commercialbrainz@postgres:5432/commercialbrainz
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "cd /app/backend && alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://commercialbrainz:commercialbrainz@postgres:5432/commercialbrainz
      DATABASE_URL_SYNC: postgresql://commercialbrainz:commercialbrainz@postgres:5432/commercialbrainz
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "cd /app/backend && arq app.workers.settings.WorkerSettings"

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
